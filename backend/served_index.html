<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life & Care - Premium Medical Guide</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet.js for Interactive Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <span class="logo">Life & Care</span>
            <div class="header-actions">
                <i class="fa-regular fa-bell"></i>
                <div class="user-avatar"></div>
            </div>
        </div>
    </header>

    <main id="app-container">
        <!-- Tab: Chat (Default) -->
        <section id="tab-chat" class="tab-content active">
            <div class="chat-container">
                <div id="chat-history" class="chat-history">
                    <div class="msg bot">안녕하세요. 무엇을 도와드릴까요?<br><small>증상을 입력하시면 AI가 분석해 드립니다.</small></div>
                </div>
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="증상을 입력하세요..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Map -->
        <section id="tab-map" class="tab-content">
            <div id="map-view-container" style="flex: 1; display: flex; flex-direction: column; position: relative;">
                <div id="map" style="flex: 1; width: 100%; height: 100%; z-index: 1;"></div>
                <div id="map-fallback" style="padding: 10px; text-align: center; background: rgba(255,255,255,0.9); position: absolute; bottom: 0; width: 100%; z-index: 10; border-top: 1px solid #eee;">
                    <p style="margin: 5px 0; font-size: 0.9rem;">상세 경로는 외부 지도를 권장합니다.</p>
                    <a id="map-link-btn" href="#" target="_blank" class="action-btn" style="display: inline-block; text-decoration: none; padding: 5px 15px; font-size: 0.8rem;">네이버 지도로 열기</a>
                </div>
            </div>
        </section>

        <!-- Tab: Health -->
        <section id="tab-health" class="tab-content">
            <div class="placeholder-view">
                <button id="refresh-report-btn" class="refresh-btn" title="리포트 갱신">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <i class="fa-solid fa-heart-pulse"></i>
                <h2>건강 리포트</h2>
                <p>최근 상담 내용을 바탕으로 AI가 종합 분석을 제공합니다.</p>
                
                <div class="report-container">

                    <div id="report-content" class="report-card">
                        상담 내역이 없습니다. 증상을 먼저 입력해 주세요.
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Settings -->
        <section id="tab-settings" class="tab-content">
            <div class="placeholder-view">
                <i class="fa-solid fa-user-gear"></i>
                <h2>내 정보 설정</h2>
                <p>사용자 정보 및 알림 설정을 관리할 수 있습니다.</p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="chat">
            <i class="fa-solid fa-comment-medical"></i>
            <span>상담</span>
        </div>
        <div class="nav-item" data-tab="map">
            <i class="fa-solid fa-map-marker-alt"></i>
            <span>병원</span>
        </div>
        <div class="nav-item" data-tab="health">
            <i class="fa-solid fa-chart-line"></i>
            <span>리포트</span>
        </div>
        <div class="nav-item" data-tab="settings">
            <i class="fa-solid fa-user"></i>
            <span>내정보</span>
        </div>
    </nav>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const navItems = document.querySelectorAll('.nav-item');
        const tabs = document.querySelectorAll('.tab-content');
        const reportContent = document.getElementById('report-content');
        const refreshReportBtn = document.getElementById('refresh-report-btn');

        // State management
        let messageHistory = []; // Store session history for report generation

        // Initialize from Cache
        const cachedReport = localStorage.getItem('healthReport');
        if (cachedReport) {
            reportContent.innerHTML = cachedReport;
        }

        // Tab Switching Logic
        function switchTab(targetTab, keyword = '') {
            // Update Nav UI
            navItems.forEach(i => {
                i.classList.remove('active');
                if (i.getAttribute('data-tab') === targetTab) {
                    i.classList.add('active');
                }
            });

            // Update Content Visibility
            tabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.id === `tab-${targetTab}`) {
                    tab.classList.add('active');
                }
            });

            if (targetTab === 'map' && keyword) {
                searchMap(keyword);
            }
        }

        // Map Management
        let map = null;
        let markers = [];
        let userLocation = { lat: 37.5665, lng: 126.9780 }; // Default: Seoul

        function initMap() {
            if (map) return;
            map = L.map('map').setView([userLocation.lat, userLocation.lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            // Re-invalidate size when tab becomes active
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.target.classList.contains('active')) {
                        setTimeout(() => map.invalidateSize(), 200);
                    }
                });
            });
            observer.observe(document.getElementById('tab-map'), { attributes: true, attributeFilter: ['class'] });
        }

        async function searchMap(keyword) {
            initMap();
            
            // Update fallback link
            const mapBtn = document.getElementById('map-link-btn');
            if (mapBtn) {
                mapBtn.href = `https://m.map.naver.com/search2/search.naver?query=${encodeURIComponent(keyword)}`;
            }

            try {
                const response = await fetch(`http://localhost:8000/hospitals?lat=${userLocation.lat}&lng=${userLocation.lng}&query=${encodeURIComponent(keyword)}`);
                const hospitals = await response.json();
                
                // Clear old markers
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                if (hospitals.length > 0) {
                    const bounds = [];
                    hospitals.forEach(h => {
                        const marker = L.marker([h.lat, h.lng]).addTo(map)
                            .bindPopup(`<b>${h.name}</b><br>${h.addr}<br><a href="tel:${h.tel}">${h.tel}</a>`);
                        markers.push(marker);
                        bounds.push([h.lat, h.lng]);
                    });
                    map.fitBounds(bounds, { padding: [50, 50] });
                }
            } catch (e) {
                console.error("Failed to load hospitals:", e);
            }
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const targetTab = item.getAttribute('data-tab');
                switchTab(targetTab);
            });
        });

        // Chat Logic
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add User Message
            addMessage(message, 'user');
            messageHistory.push(`사용자: ${message}`);
            userInput.value = '';
            userInput.style.height = 'auto';

            try {
                // Show loading state
                const loadingId = 'loading-' + Date.now();
                chatHistory.innerHTML += `<div id="${loadingId}" class="msg bot loading"><div class="dots"><span></span><span></span><span></span></div></div>`;
                chatHistory.scrollTop = chatHistory.scrollHeight;

                // Get current location if available
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            userLocation.lat = pos.coords.latitude;
                            userLocation.lng = pos.coords.longitude;
                        },
                        (err) => console.warn("Location access denied", err)
                    );
                }

                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message, 
                        lat: userLocation.lat, 
                        lng: userLocation.lng
                    })
                });
                
                const loader = document.getElementById(loadingId);
                if (loader) loader.remove();
                
                const data = await response.json();
                addMessage(data.content, 'bot', data.message_type);
                messageHistory.push(`AI: ${data.content}`);
            } catch (e) {
                document.querySelectorAll('.loading').forEach(el => el.remove());
                addMessage('오류: 서버에 연결할 수 없습니다. 서버가 실행 중인지 확인해 주세요.', 'error');
            }
        }

        async function generateReport() {
            if (messageHistory.length === 0) {
                alert("분석할 대화 내용이 없습니다.");
                return;
            }

            refreshReportBtn.classList.add('loading');
            const originalBtnContent = refreshReportBtn.innerHTML;
            
            try {
                const historyText = messageHistory.join('\n');
                const response = await fetch('http://localhost:8000/report', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({history: historyText})
                });

                const data = await response.json();
                
                // Structure the report: Summary + Bullet Points
                const rawSummary = data.summary;
                const sections = rawSummary.split('\n\n');
                const mainSummary = sections[0];
                const rest = sections.slice(1).join('\n\n');
                
                let htmlContent = `<div class="report-summary">${mainSummary}</div>`;
                if (rest) {
                    const bullets = rest.split('\n').filter(line => line.trim().length > 0);
                    htmlContent += `<div class="report-bullets"><ul>`;
                    bullets.forEach(b => {
                        const cleanBullet = b.replace(/^[•\-\*\d\.]+\s*/, '');
                        htmlContent += `<li>${cleanBullet}</li>`;
                    });
                    htmlContent += `</ul></div>`;
                }

                reportContent.innerHTML = htmlContent;
                
                // Cache the report (as HTML string for fast rendering)
                localStorage.setItem('healthReport', htmlContent);
            } catch (e) {
                console.error(e);
                alert("리포트 생성 중 오류가 발생했습니다.");
            } finally {
                refreshReportBtn.classList.remove('loading');
                refreshReportBtn.innerHTML = originalBtnContent;
            }
        }

        refreshReportBtn.addEventListener('click', generateReport);

        function addMessage(text, type, subType = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type} ${subType}`;
            
            // Clean specific markers and horizontal lines from text for cleaner UI
            let cleanText = text
                .replace(/\[HOSPITAL:[^\]]+\]/g, '')
                .replace(/^[\-\*]{3,}\s*$/gm, '') // Remove horizontal lines like --- or ***
                .trim();

            // Special handling for Emergency
            if (subType === 'emergency') {
                msgDiv.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <strong>응급 상황 감지</strong><br>${cleanText}`;
            } else {
                msgDiv.innerText = cleanText;
            }
            
            chatHistory.appendChild(msgDiv);

            // Add Hospital Guide Chip & List if marker was present
            if (text.includes('[HOSPITAL:')) {
                const match = text.match(/\[HOSPITAL:([^\]]+)\]/);
                const dept = match ? match[1] : '병원';
                
                // 1. Add Navigation Chip
                const chip = document.createElement('div');
                chip.className = 'hospital-chip';
                chip.innerHTML = `<i class="fa-solid fa-location-dot"></i> 내 주변 ${dept} 찾기`;
                chip.onclick = () => switchTab('map', dept);
                chatHistory.appendChild(chip);

                // 2. Add Detailed Hospital List (Mock with structure requested)
                renderHospitalList(dept);
            }
            // Ensure DOM is fully painted before calculating scroll height
            setTimeout(() => {
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 300);
        }

        function renderHospitalList(dept) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'hospital-dense-card';
            
            // Comprehensive Mock Data for Ultra-Dense view
            const mockHospitals = [
                { name: '강남 성모병원', dist: '1.2km', status: '진료중', er: '8석', tel: '02-590-1114', addr: '서초구 반포대로 222' },
                { name: '서울 대학교병원', dist: '2.5km', status: '진료중', er: '2석', tel: '02-2072-2114', addr: '종로구 대학로 101' },
                { name: '세브란스 병원', dist: '3.1km', status: '대기중', er: '0석', tel: '02-2228-0114', addr: '서대문구 연세로 50' },
                { name: '아산 병원', dist: '4.8km', status: '진료중', er: '15석', tel: '02-3010-3114', addr: '송파구 올림픽로43길 88' },
                { name: '삼성 서울병원', dist: '5.2km', status: '진료중', er: '6석', tel: '02-3410-2114', addr: '강남구 일원로 81' }
            ];

            let tableHtml = `<table class="hospital-table">`;
            mockHospitals.forEach(h => {
                tableHtml += `
                    <tr onclick="switchTab('map', '${h.name}')" style="cursor: pointer;" title="지도에서 보기" class="hoverable-row">
                        <td class="td-name">
                            ${h.name}
                            <span class="dense-meta" style="color:var(--primary); font-weight:600;"><i class="fa-solid fa-location-dot"></i> ${h.dist}</span>
                        </td>
                        <td class="td-info">
                            <div>${h.addr}</div>
                            <div style="font-weight:600; color:#444;">${h.tel}</div>
                        </td>
                        <td class="td-status">
                            <div class="dense-status"><span class="status-light ${h.status === '진료중' ? 'green' : 'gray'}"></span> ${h.status}</div>
                            <div class="dense-er"><span class="status-light ${parseInt(h.er) > 0 ? 'green' : 'red'}"></span> 응급실: ${h.er}</div>
                        </td>
                    </tr>
                `;
            });
            tableHtml += `</table>`;
            cardDiv.innerHTML = tableHtml;

            chatHistory.appendChild(cardDiv);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            this.style.overflowY = this.scrollHeight > 100 ? 'scroll' : 'hidden';
        });
    </script>
</body>
</html>
