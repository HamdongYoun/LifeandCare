name: life_and_care
description: "A new Flutter project for Life & Care AI Chatbot."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  google_generative_ai: ^0.2.1
  geolocator: ^10.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.2.4
  webview_flutter: ^4.4.2
  lottie: ^3.1.0
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.6
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
