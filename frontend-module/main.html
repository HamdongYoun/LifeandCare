<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life & Care - Premium Medical Guide</title>
    <link rel="stylesheet" href="shared-logic/css/base.css?v=1.8">
    <link rel="stylesheet" href="shared-logic/css/layout.css?v=1.8">
    <link rel="stylesheet" href="shared-logic/css/components.css?v=1.8">
    <link rel="stylesheet" href="1tab_chat/chat_view.css?v=1.7">
    <link rel="stylesheet" href="2tab_map/map_view.css?v=1.7">
    <link rel="stylesheet" href="3tab_health/3tab_health.css?v=1.7">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=g19msx7v4z"></script>
    <script type="module" src="shared-logic/db_provider.js"></script>
</head>

<body>
    <header class="main-header">
        <div class="header-content">
            <button id="history-menu-btn" class="menu-btn" title="상담 히스토리 열기">
                <i class="fa-solid fa-bars"></i>
            </button>
            <span class="logo">Life & Care</span>
            <div class="header-actions">
                <div id="health-status-badge" class="health-badge normal" title="현재 건강 상태">
                    <i class="fa-solid fa-heart"></i> <span>정상</span>
                </div>
                <i class="fa-regular fa-bell"></i>
                <div class="user-avatar"></div>
            </div>
        </div>
    </header>

    <!-- History Drawer Overlay -->
    <div id="history-drawer" class="drawer">
        <div class="drawer-header">
            <h3>상담 기록 (노트)</h3>
            <button id="close-drawer-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="note-list" class="note-list drawer-content">
            <div class="empty-msg">저장된 노트가 없습니다.</div>
        </div>
    </div>
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <main id="app-container">
        <!-- Tab: Chat -->
        <section id="tab-chat" class="tab-content active">
            <div class="chat-container">
                <div id="chat-history" class="chat-history">
                    <div class="msg bot">안녕하세요. 무엇을 도와드릴까요?<br><small>증상을 입력하시면 AI가 분석해 드립니다.</small></div>
                </div>
                <div class="chat-actions-bar" style="padding: 0 16px 8px;">
                    <button id="add-note-btn" class="action-btn" style="width: 100%; margin-top: 10px; padding: 10px; font-size: 0.85rem; border-radius: 12px; background: var(--secondary);">
                        <i class="fa-solid fa-notes-medical"></i> 현재 상담을 기록으로 요약 저장
                    </button>
                </div>
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="증상을 입력하세요..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Map (RECOVERED BY IMPLEMENT TEAM) -->
        <section id="tab-map" class="tab-content">
            <div id="map-view-container" style="flex: 1; display: flex; flex-direction: column; position: relative;">
                <!-- Floating Map UI: 검색 및 카테고리 칩 -->
                <div class="floating-map-ui">
                    <div class="map-search-wrapper">
                        <input type="text" id="map-search-input" placeholder="병원 또는 진료과 검색...">
                    </div>
                    <div class="category-chips-container">
                        <div class="map-chip" data-keyword="소아과"><i class="fa-solid fa-baby"></i> 소아과</div>
                        <div class="map-chip" data-keyword="정형외과"><i class="fa-solid fa-bone"></i> 정형외과</div>
                        <div class="map-chip" data-keyword="약국"><i class="fa-solid fa-pills"></i> 약국</div>
                        <div class="map-chip" data-keyword="응급실"><i class="fa-solid fa-truck-medical"></i> 응급실</div>
                    </div>
                </div>

                <div id="map"></div>
                
                <!-- Map Fallback: 현재위치 및 외부 링크 -->
                <div id="map-fallback"
                    style="padding: 10px; text-align: center; background: rgba(255,255,255,0.9); position: absolute; bottom: 85px; width: 100%; z-index: var(--z-map-fallback); border-top: 1px solid #eee; display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <button id="recenter-btn" class="action-btn"
                        style="padding: 5px 10px; font-size: 0.8rem; background: var(--secondary);"><i
                            class="fa-solid fa-crosshairs"></i> 현재위치</button>
                    <a id="map-link-btn" href="#" target="_blank" class="action-btn"
                        style="display: inline-block; text-decoration: none; padding: 5px 15px; font-size: 0.8rem;">네이버 지도로 열기</a>
                </div>
            </div>
        </section>

        <!-- Tab: Health -->
        <section id="tab-health" class="tab-content">
            <div class="health-view">
                <div class="health-header">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <h2>종합 분석 리포트</h2>
                    <button id="refresh-report-btn" class="refresh-btn" title="리포트 새로고침">
                        <i class="fa-solid fa-sync-alt"></i>
                    </button>
                </div>
                <div class="report-section full-prominence">
                    <div id="report-content" class="report-card">최근 내역이 없습니다. (AI 분석을 시작하세요)</div>
                </div>
            </div>
        </section>

        <!-- Tab: Settings -->
        <section id="tab-settings" class="tab-content">
            <div class="settings-view">
                <div class="settings-header">
                    <i class="fa-solid fa-user-gear"></i>
                    <h2>설정 및 권한</h2>
                </div>
                <div class="settings-card">
                    <div class="settings-item">
                        <div class="item-info">
                            <i class="fa-solid fa-location-crosshairs"></i>
                            <div>
                                <strong>위치 정보 허용</strong>
                                <div id="location-status-text" class="status-sub">확인 중...</div>
                            </div>
                        </div>
                        <div id="location-status-indicator" class="status-dot gray"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="chat">
            <i class="fa-solid fa-comment-medical"></i>
            <span>상담</span>
        </div>
        <div class="nav-item" data-tab="map">
            <i class="fa-solid fa-map-marker-alt"></i>
            <span>병원</span>
        </div>
        <div class="nav-item" data-tab="health">
            <i class="fa-solid fa-chart-line"></i>
            <span>리포트</span>
        </div>
        <div class="nav-item" data-tab="settings">
            <i class="fa-solid fa-user"></i>
            <span>내정보</span>
        </div>
    </nav>

    <!-- Modular ViewModels & Components (Clean Architecture) -->
    <script src="1tab_chat/chat_view_adapter.js"></script>
    <script src="2tab_map/map_adapter.js"></script>
    <script src="2tab_map/map_view_model.js"></script>
    <script src="1tab_chat/chat_view_model.js"></script>
    <script type="module" src="shared-logic/main.js"></script>
</body>

</html>
