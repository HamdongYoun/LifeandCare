<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Life & Care - AI Medical Consultation">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lifeand_care_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>Life & Care</title>
  <link rel="manifest" href="manifest.json">

  <!-- [SYNC] NAVER MAP SDK - WEB v3 (from .env) -->
  <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=g19msx7v4z"></script>
  <style>
    #naver-map-web {
        width: 100%;
        height: 100%;
    }
  </style>
</head>
<body>
  <!-- [SYNC] Premium Loading Box (Legacy: loading-wrapper) -->
  <div id="loading-box" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#F8FAFC;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
    <div style="width:40px;height:40px;border:3px solid #E2E8F0;border-top:3px solid #2563EB;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p style="margin-top:16px;font-family:'Inter',sans-serif;color:#64748B;font-size:14px;font-weight:500;">Life & Care 엔진 기동 중...</p>
  </div>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <!-- [ENGINE BRIDGE] FLUTTER LOADER v3 (Premium Standard) -->
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // 1. Initialize Loader
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null, // [SILENT] Disable SW for local debugging stability
        },
        onEntrypointLoaded: function(engineInitializer) {
          // 2. Build Engine
          engineInitializer.initializeEngine({
            renderer: "canvaskit", // [HIGH PERFORMANCE] CanvasKit renderer
            useColorEmoji: true,
          }).then(function(appRunner) {
            // 3. Remove Loading Box BEFORE running to prevent race condition
            const loadingBox = document.getElementById('loading-box');
            if (loadingBox) loadingBox.remove();
            
            // 4. Fire!
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
